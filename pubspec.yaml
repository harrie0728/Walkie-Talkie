name: walkie_talkie_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.0
  socket_io_client: ^2.0.3
  flutter_sound: ^9.2.13
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: MyDigitalFont
      fonts:
        - asset: assets/fonts/LCD.ttf

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"